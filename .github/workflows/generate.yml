name: Generate Library JSON

on:
  push:
    paths:
      - 'library/**'

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node generate.js

      - name: Commit library.json
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add library.json

          git diff --cached --quiet || git commit -m "Update library.json"

          git push